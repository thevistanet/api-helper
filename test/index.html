<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Voyager Dynamic API Help</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; height: 100vh; position: fixed; overflow-y: auto; }
    .content-area { margin-left: 280px; padding: 30px; }
    .nav-pills .nav-link { color: #475569; border-radius: 6px; margin: 2px 15px; padding: 8px 15px; cursor: pointer; }
    .nav-pills .nav-link:hover { background-color: #f1f5f9; }
    .nav-pills .nav-link.active { background-color: #3b82f6; color: white; }
    .api-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 25px; margin-bottom: 25px; display: none; }
    .api-card.active { display: block; }
    .global-bar { background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
    pre.json-output { background: #1e293b; color: #38bdf8; padding: 15px; border-radius: 8px; max-height: 500px; overflow-y: auto; font-size: 14px; }
    .category-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin: 15px 15px 5px 20px; font-weight: 600; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="p-3 border-bottom mb-2">
      <h5 class="m-0 fw-bold text-primary">Voyager API</h5>
    </div>
    <ul class="nav nav-pills flex-column" id="sidebar-menu"></ul>
  </aside>

  <main class="content-area">
    <div class="global-bar d-flex align-items-center justify-content-between">
      <div class="input-group w-50">
        <span class="input-group-text bg-light">Base URL</span>
        <input type="text" class="form-control" id="global-url" value="http://localhost/api">
      </div>
      <div>
        <span class="badge bg-success py-2 px-3">Session: <span id="global-session">None</span></span>
        <input type="hidden" id="session-val">
      </div>
    </div>

    <div id="dynamic-sections"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
